<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BTS《ARIRANG》2026 巡迴 — 情緒歌單</title>
<style>
:root {
  --bg: #07000F;
  --surface: #110020;
  --primary: #7B2FBE;
  --primary-light: #C084FC;
  --accent: #F0ABFC;
  --text: #F3E8FF;
  --muted: #9B8BB0;
  --card: rgba(123,47,190,0.12);
  --card-hover: rgba(123,47,190,0.28);
  --border: rgba(192,132,252,0.2);
  --active: rgba(123,47,190,0.35);
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang TC', sans-serif;
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

/* HEADER */
header {
  background: linear-gradient(135deg,#1A0035,#07000F);
  border-bottom: 1px solid var(--border);
  padding: 12px 24px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}
.logo { font-size: 1.5rem; }
header h1 {
  font-size: 1rem;
  font-weight: 700;
  background: linear-gradient(90deg,#C084FC,#F0ABFC);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
header p { font-size: 0.68rem; color: var(--muted); margin-top: 2px; }

/* MAIN LAYOUT */
.main {
  display: grid;
  grid-template-columns: 340px 1fr;
  flex: 1;
  overflow: hidden;
}

/* LEFT — Song list */
.left {
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--border);
  background: var(--surface);
  overflow: hidden;
}

.mood-tabs {
  display: flex;
  gap: 6px;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
  flex-shrink: 0;
  scrollbar-width: none;
}
.mood-tabs::-webkit-scrollbar { display:none; }
.mood-tab {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 4px 12px;
  font-size: 0.74rem;
  color: var(--muted);
  cursor: pointer;
  white-space: nowrap;
  transition: all .18s;
}
.mood-tab:hover, .mood-tab.active {
  background: var(--primary);
  border-color: var(--primary);
  color: #fff;
}

.song-list {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
}
.mood-section { margin-bottom: 20px; }
.mood-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}
.mood-header h3 { font-size: 0.8rem; color: var(--primary-light); }
.count { font-size: 0.65rem; color: var(--muted); background: var(--card); padding: 1px 7px; border-radius: 10px; }

.song-card {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 10px;
  border-radius: 8px;
  cursor: pointer;
  transition: all .15s;
  border: 1px solid transparent;
  margin-bottom: 3px;
}
.song-card:hover { background: var(--card-hover); border-color: var(--border); }
.song-card.playing {
  background: var(--active);
  border-color: var(--primary);
}
.song-num { font-size: 0.68rem; color: var(--muted); width: 18px; text-align:center; flex-shrink:0; }
.song-card.playing .song-num { color: var(--primary-light); }
.song-info { flex:1; min-width:0; }
.song-title { font-size: 0.84rem; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.song-card.playing .song-title { color: var(--primary-light); }
.song-meta { font-size: 0.68rem; color: var(--muted); margin-top: 1px; }
.play-icon { font-size: 0.9rem; flex-shrink:0; opacity:0; transition:opacity .15s; }
.song-card:hover .play-icon, .song-card.playing .play-icon { opacity:1; }

/* RIGHT — Player + Lyrics */
.right {
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Welcome screen */
.welcome {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  color: var(--muted);
  padding: 40px;
  text-align: center;
}
.welcome .big { font-size: 3rem; }
.welcome h2 { font-size: 1rem; color: var(--primary-light); }
.welcome p { font-size: 0.82rem; line-height: 1.7; }

/* Player area */
.player-area {
  display: none;
  flex-direction: column;
  flex: 1;
  overflow: hidden;
}
.player-area.visible { display: flex; }

.embed-wrap {
  padding: 16px 16px 0;
  flex-shrink: 0;
}
.embed-wrap iframe {
  border-radius: 12px;
  display: block;
}

/* Song info bar */
.song-bar {
  padding: 12px 20px 8px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.song-bar h2 { font-size: 1rem; font-weight:700; }
.song-bar .sub { font-size: 0.74rem; color: var(--muted); margin-top:2px; }
.song-bar .desc { font-size: 0.8rem; color: var(--primary-light); margin-top:6px; }
.mood-badge {
  display: inline-block;
  background: var(--primary);
  border-radius: 10px;
  padding: 2px 10px;
  font-size: 0.68rem;
  margin-top: 4px;
}

/* Lyrics panel */
.lyrics-panel {
  flex: 1;
  overflow-y: auto;
  padding: 16px 20px;
}
.col-header {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  padding-bottom: 8px;
  margin-bottom: 8px;
  border-bottom: 1px solid var(--border);
}
.col-header span { font-size: 0.65rem; color: var(--muted); text-align:center; letter-spacing:1px; text-transform:uppercase; }
.lyric-section { margin-bottom: 18px; }
.section-tag {
  font-size: 0.62rem;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--accent);
  margin-bottom: 6px;
}
.lyric-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  padding: 6px 0;
  border-bottom: 1px solid rgba(192,132,252,.07);
}
.lyric-orig { font-size: 0.86rem; line-height:1.65; }
.lyric-cn   { font-size: 0.86rem; line-height:1.65; color: var(--primary-light); }

/* scrollbar */
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 4px; }

/* MOBILE */
@media (max-width: 700px) {
  body { overflow-y: auto; height: auto; }
  header { padding: 10px 14px; }
  header h1 { font-size: 0.88rem; }
  header p { display: none; }

  .main {
    grid-template-columns: 1fr;
    grid-template-rows: auto;
    overflow: visible;
  }

  .left {
    border-right: none;
    border-bottom: 1px solid var(--border);
    overflow: visible;
    max-height: none;
  }
  .song-list { overflow-y: visible; max-height: none; padding-bottom: 4px; }

  .right { overflow: visible; }

  .player-area {
    overflow: visible;
  }
  .player-area.visible { display: flex; }

  .embed-wrap { padding: 12px 12px 0; }
  .embed-wrap iframe { height: 160px; }

  .song-bar { padding: 10px 14px 8px; }
  .song-bar h2 { font-size: 0.9rem; }

  .lyrics-panel { overflow-y: visible; padding: 12px 14px; }
  .lyric-orig, .lyric-cn { font-size: 0.8rem; }

  .welcome { padding: 30px 20px; }
  .welcome .big { font-size: 2rem; }
}
</style>
</head>

let currentId = null;

function renderSongs(filterMood = 'all') {
  const list = document.getElementById('songList');
  list.innerHTML = '';
  const moodOrder = ['ignite','power','dark','heal','love','ascend'];
  moodOrder.forEach(mood => {
    const group = SONGS.filter(s => s.mood === mood && (filterMood === 'all' || s.mood === filterMood));
    if (!group.length) return;
    const sec = document.createElement('div');
    sec.className = 'mood-section';
    sec.innerHTML = `<div class="mood-header"><h3>${MOODS[mood]}</h3><span class="count">${group.length}</span></div>`;
    group.forEach(song => {
      const card = document.createElement('div');
      card.className = 'song-card' + (song.id === currentId ? ' playing' : '');
      card.id = `card-${song.id}`;
      card.innerHTML = `
        <span class="song-num">${song.id}</span>
        <div class="song-info">
          <div class="song-title">${song.title}</div>
          <div class="song-meta">${song.album} · ${song.year}</div>
        </div>
        <span class="play-icon">${song.id === currentId ? '▶' : '▶'}</span>`;
      card.onclick = () => playSong(song);
      sec.appendChild(card);
    });
    list.appendChild(sec);
  });
}

function playSong(song) {
  currentId = song.id;

  // Update Spotify embed
  document.getElementById('spotifyEmbed').src =
    `https://open.spotify.com/embed/track/${song.spotifyId}?utm_source=generator&theme=0`;

  // Update song info bar
  document.getElementById('barTitle').textContent = song.title;
  document.getElementById('barSub').textContent = `${song.album} · ${song.year}`;
  document.getElementById('barMood').textContent = MOODS[song.mood];
  document.getElementById('barDesc').textContent = song.desc;

  // Update lyrics
  document.getElementById('lyricsContent').innerHTML = song.lyrics.map(sec => `
    <div class="lyric-section">
      <div class="section-tag">${sec.s}</div>
      ${sec.lines.map(l => `
        <div class="lyric-row">
          <div class="lyric-orig">${l.o}</div>
          <div class="lyric-cn">${l.t}</div>
        </div>`).join('')}
    </div>`).join('');

  // Show player, hide welcome
  document.getElementById('welcome').style.display = 'none';
  document.getElementById('playerArea').classList.add('visible');

  // Update active card
  document.querySelectorAll('.song-card').forEach(c => c.classList.remove('playing'));
  const activeCard = document.getElementById(`card-${song.id}`);
  if (activeCard) {
    activeCard.classList.add('playing');
    activeCard.querySelector('.play-icon').textContent = '▶';
  }

  // On mobile: scroll to player
  if (window.innerWidth <= 700) {
    document.getElementById('playerArea').scrollIntoView({ behavior: 'smooth' });
  }
}

// Mood tabs
document.querySelectorAll('.mood-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.mood-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    renderSongs(tab.dataset.mood);
  });
});

renderSongs();
</script>
