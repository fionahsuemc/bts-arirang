<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BTS《ARIRANG》2026 巡迴 — 情緒歌單</title>
<style>
:root {
  --bg: #07000F;
  --surface: #110020;
  --primary: #7B2FBE;
  --primary-light: #C084FC;
  --accent: #F0ABFC;
  --text: #F3E8FF;
  --muted: #9B8BB0;
  --card: rgba(123,47,190,0.12);
  --card-hover: rgba(123,47,190,0.25);
  --border: rgba(192,132,252,0.2);
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang TC', sans-serif;
}
@media (max-width: 768px) {
  html, body { overflow: auto; height: auto; }
}

/* ── HEADER ── */
header {
  height: 64px;
  background: linear-gradient(135deg,#1A0035,#07000F);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 28px;
  gap: 14px;
  flex-shrink: 0;
}
.logo { font-size: 1.6rem; }
header h1 {
  font-size: 1.05rem;
  font-weight: 700;
  background: linear-gradient(90deg,#C084FC,#F0ABFC);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
header p { font-size: 0.72rem; color: var(--muted); margin-top:2px; }
@media (max-width: 768px) {
  header { height: auto; padding: 14px 16px; }
  header h1 { font-size: 0.95rem; }
  .logo { font-size: 1.3rem; }
}

/* ── LAYOUT ── */
.layout {
  display: grid;
  grid-template-columns: 360px 1fr;
  height: calc(100vh - 64px);
}
@media (max-width: 768px) {
  .layout {
    grid-template-columns: 1fr;
    grid-template-rows: auto 1fr;
    height: auto;
  }
}

/* ── LEFT PANEL ── */
.player-panel {
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  overflow-y: auto;
}
@media (max-width: 768px) {
  .player-panel {
    border-right: none;
    border-bottom: 1px solid var(--border);
    padding: 14px;
    overflow-y: visible;
  }
  .info-box { display: none; }
}
.panel-label {
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--muted);
}
.spotify-embed { border-radius: 12px; overflow: hidden; }
.info-box {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 16px;
}
.info-box h3 { font-size: 0.82rem; color: var(--primary-light); margin-bottom: 6px; }
.info-box p  { font-size: 0.78rem; color: var(--muted); line-height: 1.65; }
.mood-map    { font-size: 0.78rem; color: var(--muted); line-height: 2; }

/* ── RIGHT PANEL ── */
.browser-panel { display:flex; flex-direction:column; overflow:hidden; }
@media (max-width: 768px) {
  .browser-panel { overflow: visible; min-height: 60vh; }
}

.mood-tabs {
  display: flex;
  gap: 8px;
  padding: 14px 22px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  overflow-x: auto;
  flex-shrink: 0;
}
@media (max-width: 768px) {
  .mood-tabs { padding: 10px 14px; gap: 6px; }
  .mood-tab { font-size: 0.72rem; padding: 4px 10px; }
}
.mood-tab {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 5px 14px;
  font-size: 0.78rem;
  color: var(--muted);
  cursor: pointer;
  white-space: nowrap;
  transition: all .2s;
}
.mood-tab:hover, .mood-tab.active {
  background: var(--primary);
  border-color: var(--primary);
  color: #fff;
}

.song-list {
  flex: 1;
  overflow-y: auto;
  padding: 18px 22px;
}
@media (max-width: 768px) {
  .song-list { padding: 14px; overflow-y: visible; }
  .song-card { padding: 10px 10px; }
  .song-title { font-size: 0.83rem; }
  .song-meta  { font-size: 0.68rem; }
}
.mood-section { margin-bottom: 26px; }
.mood-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}
.mood-header h3 { font-size: 0.88rem; color: var(--primary-light); }
.count {
  font-size: 0.7rem;
  color: var(--muted);
  background: var(--card);
  padding: 2px 8px;
  border-radius: 10px;
}
.song-card {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 12px;
  border-radius: 9px;
  cursor: pointer;
  transition: all .18s;
  border: 1px solid transparent;
  margin-bottom: 4px;
}
.song-card:hover {
  background: var(--card-hover);
  border-color: var(--border);
}
.song-num { font-size: 0.72rem; color: var(--muted); width: 22px; text-align:center; }
.song-info { flex:1; }
.song-title { font-size: 0.87rem; font-weight:600; }
.song-meta  { font-size: 0.72rem; color: var(--muted); margin-top:2px; }
.play-icon  { font-size:1rem; opacity:0; transition:opacity .2s; }
.song-card:hover .play-icon { opacity:1; }

/* ── MODAL ── */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.88);
  z-index: 200;
  backdrop-filter: blur(10px);
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.overlay.open { display:flex; }
.modal {
  background: linear-gradient(140deg,#1A0035,#08000E);
  border: 1px solid var(--border);
  border-radius: 20px;
  width: 100%;
  max-width: 820px;
  max-height: 92vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  box-shadow: 0 30px 80px rgba(0,0,0,.6);
}
@media (max-width: 768px) {
  .overlay { padding: 0; align-items: flex-end; }
  .modal {
    border-radius: 20px 20px 0 0;
    max-height: 88vh;
    max-width: 100%;
  }
  .modal-top { padding: 16px 18px 12px; }
  .modal-top h2 { font-size: 1rem; }
  .modal-desc { padding: 8px 18px; font-size: 0.78rem; }
  .lyrics-body { padding: 16px 18px; }
  .lyric-row { gap: 8px; padding: 6px 0; }
  .lyric-orig, .lyric-cn { font-size: 0.82rem; }
}
.modal-top {
  padding: 22px 26px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  flex-shrink: 0;
}
.modal-top h2  { font-size: 1.25rem; font-weight:700; }
.modal-top .sub { font-size: 0.76rem; color: var(--muted); margin-top:4px; }
.mood-badge {
  display: inline-block;
  background: var(--primary);
  border-radius: 12px;
  padding: 2px 10px;
  font-size: 0.72rem;
  margin-top: 8px;
}
.close-btn {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  width: 32px; height: 32px;
  color: var(--text);
  font-size: 1rem;
  cursor: pointer;
  display: flex; align-items:center; justify-content:center;
  flex-shrink: 0;
  transition: background .2s;
}
.close-btn:hover { background: var(--card-hover); }
.modal-desc {
  padding: 10px 26px;
  font-size: 0.82rem;
  color: var(--primary-light);
  background: rgba(123,47,190,.08);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.lyrics-body {
  flex:1;
  overflow-y: auto;
  padding: 22px 26px;
}
.col-header {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  padding-bottom: 10px;
  margin-bottom: 6px;
  border-bottom: 1px solid var(--border);
}
.col-header span { font-size: 0.7rem; color: var(--muted); text-align:center; letter-spacing:1px; }
.lyric-section { margin-bottom: 22px; }
.section-tag {
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--accent);
  margin-bottom: 8px;
}
.lyric-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  padding: 7px 0;
  border-bottom: 1px solid rgba(192,132,252,.07);
}
.lyric-orig { font-size: 0.88rem; line-height:1.65; }
.lyric-cn   { font-size: 0.88rem; line-height:1.65; color: var(--primary-light); }

/* scrollbar */
::-webkit-scrollbar { width:3px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--primary); border-radius:4px; }
</style>
</head>

function renderSongs(filterMood = 'all') {
  const list = document.getElementById('songList');
  list.innerHTML = '';
  const moodOrder = ['ignite','power','dark','heal','love','ascend'];
  moodOrder.forEach(mood => {
    const group = SONGS.filter(s => s.mood === mood && (filterMood === 'all' || s.mood === filterMood));
    if (!group.length) return;
    const sec = document.createElement('div');
    sec.className = 'mood-section';
    sec.innerHTML = `<div class="mood-header"><h3>${MOODS[mood]}</h3><span class="count">${group.length} 首</span></div>`;
    group.forEach(song => {
      const card = document.createElement('div');
      card.className = 'song-card';
      card.innerHTML = `
        <span class="song-num">${song.id}</span>
        <div class="song-info">
          <div class="song-title">${song.title}</div>
          <div class="song-meta">${song.album} · ${song.year}</div>
        </div>
        <span class="play-icon">📖</span>`;
      card.onclick = () => openLyrics(song);
      sec.appendChild(card);
    });
    list.appendChild(sec);
  });
}

function openLyrics(song) {
  document.getElementById('mTitle').textContent = song.title;
  document.getElementById('mSub').textContent = `${song.album} · ${song.year}`;
  document.getElementById('mMood').textContent = MOODS[song.mood];
  document.getElementById('mDesc').textContent = song.desc;
  document.getElementById('lyricsContent').innerHTML = song.lyrics.map(sec => `
    <div class="lyric-section">
      <div class="section-tag">${sec.s}</div>
      ${sec.lines.map(l => `
        <div class="lyric-row">
          <div class="lyric-orig">${l.o}</div>
          <div class="lyric-cn">${l.t}</div>
        </div>`).join('')}
    </div>`).join('');
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
}

function closeOnBg(e) {
  if (e.target === document.getElementById('overlay')) closeModal();
}

document.querySelectorAll('.mood-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.mood-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    renderSongs(tab.dataset.mood);
  });
});

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

renderSongs();
</script>
